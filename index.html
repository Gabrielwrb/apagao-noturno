<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo do Apagão | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; scroll-behavior: smooth; }
        
        /* Barra de progresso customizada */
        .vsl-progress-container { width: 100%; background: #27272a; height: 10px; border-radius: 999px; overflow: hidden; margin-top: 15px; }
        #progress-bar-fill { height: 100%; background: #dc2626; width: 0%; transition: width 0.5s linear; }

        /* Botão de Play Central */
        #play-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        .play-btn-circle {
            width: 85px; height: 85px;
            background: #dc2626;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 35px rgba(220, 38, 38, 0.6);
            animation: pulse-play 1.5s infinite;
        }
        @keyframes pulse-play {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }

        .video-overlay-blocker { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; cursor: default; }
        
        /* Esconde o CTA inicialmente */
        #cta-section { display: none; }
    </style>
</head>
<body class="selection:bg-red-600 selection:text-white">

    <div id="top-banner" class="bg-red-600 text-white text-center py-2 font-bold text-sm uppercase tracking-widest fixed w-full z-50">
        ⚠️ ÚLTIMAS <span id="vagas-count">19</span> VAGAS COM MAIS DE 70% OFF
    </div>

    <section class="px-6 pt-24 pb-12 max-w-4xl mx-auto text-center">
        <div class="inline-flex items-center gap-2 mb-6 bg-zinc-900/80 px-4 py-1.5 rounded-full border border-zinc-800">
            <span class="flex h-2 w-2 rounded-full bg-green-500 animate-ping"></span>
            <span class="text-xs text-gray-300 font-medium"><span id="visitantes">134</span> assistindo agora</span>
        </div>

        <h1 class="text-3xl md:text-5xl font-black mb-6 leading-tight uppercase italic">
            Desligue sua mente e durma <span class="text-red-600">sem ficar rolando na cama por horas.</span>
        </h1>
        
        <p class="text-zinc-400 text-lg md:text-xl mb-10 font-medium">
            Feito para quem deita cansado e não dorme.
        </p>

        <div class="relative w-full bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden shadow-2xl">
            <div id="play-overlay" onclick="startVideo()">
                <div class="flex flex-col items-center gap-4">
                    <div class="play-btn-circle">
                        <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.333-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"></path></svg>
                    </div>
                    <span class="text-white font-black text-xs tracking-[0.2em]">CLIQUE PARA OUVIR</span>
                </div>
            </div>
            <div class="video-overlay-blocker"></div>
            <div style="padding:75% 0 0 0;position:relative;">
                <iframe id="vsl-video" src="https://player.vimeo.com/video/1183600782?badge=0&autopause=0&player_id=0&app_id=58479&autoplay=1&muted=1&controls=0" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="VSL"></iframe>
            </div>
        </div>
        
        <div class="vsl-progress-container">
            <div id="progress-bar-fill"></div>
        </div>

        <div id="cta-section" class="mt-8 animate-bounce">
            <div class="max-w-md mx-auto">
                <a href="https://pay.kiwify.com.br/6stdDAC" target="_blank" class="block w-full bg-green-600 hover:bg-green-500 text-white font-black py-5 px-4 rounded-xl text-xl md:text-2xl transition-all shadow-[0_0_20px_rgba(22,163,74,0.5)] uppercase">
                    QUERO MEU ACESSO IMEDIATO
                </a>
                <div class="mt-4 flex items-center justify-center gap-4 text-zinc-500 text-[10px] uppercase font-bold tracking-widest">
                    <span>Acesso Vitalício</span>
                    <span class="w-1 h-1 bg-zinc-700 rounded-full"></span>
                    <span>Garantia de 7 Dias</span>
                </div>
            </div>
        </div>
    </section>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        const iframe = document.querySelector('#vsl-video');
        const vimeoPlayer = new Vimeo.Player(iframe);
        const overlay = document.getElementById('play-overlay');
        const progressFill = document.getElementById('progress-bar-fill');
        const cta = document.getElementById('cta-section');
        
        const DURACAO_BARRA = 140; // 2 minutos e 20 segundos

        function startVideo() {
            vimeoPlayer.setMuted(false);
            vimeoPlayer.setVolume(1);
            vimeoPlayer.play();
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }

        vimeoPlayer.on('timeupdate', function(data) {
            let tempoAtual = data.seconds;
            let percentual = (tempoAtual / DURACAO_BARRA) * 100;
            
            if (percentual > 100) percentual = 100;
            progressFill.style.width = percentual + '%';

            // Mostra o CTA apenas quando atingir o tempo determinado
            if (tempoAtual >= DURACAO_BARRA) {
                cta.style.display = 'block';
            }
        });

        window.onload = function() {
            vimeoPlayer.ready().then(() => {
                vimeoPlayer.setMuted(true);
                vimeoPlayer.play();
            });
        };

        // Lógica de Vagas
        let vagas = 19;
        setInterval(() => {
            if (vagas > 1) {
                vagas -= 1;
                document.getElementById('vagas-count').innerText = vagas;
            }
        }, 18000);

        // Lógica de Visitantes
        setInterval(() => {
            const display = document.querySelector('#visitantes');
            let current = parseInt(display.textContent);
            display.textContent = Math.max(120, current + (Math.floor(Math.random() * 5) - 2));
        }, 3000);
    </script>
</body>
</html>
