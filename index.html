<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo do Apagão | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; scroll-behavior: smooth; }
        
        /* Estilo WhatsApp */
        .wp-container { background: #0b141a; border-radius: 15px; padding: 15px; max-width: 400px; margin: 10px auto; border: 1px solid #202c33; text-align: left; }
        .wp-msg { background: #202c33; color: #e9edef; padding: 8px 12px; border-radius: 0 10px 10px 10px; margin-bottom: 10px; font-size: 14px; position: relative; width: fit-content; max-width: 90%; }
        .wp-msg::before { content: ""; position: absolute; left: -8px; top: 0; border: 8px solid transparent; border-top-color: #202c33; border-right-color: #202c33; }
        .wp-name { font-weight: bold; color: #d1d7db; font-size: 12px; margin-bottom: 2px; display: block; }
        .wp-time { font-size: 10px; color: #8696a0; float: right; margin-left: 10px; margin-top: 5px; }

        /* BLOQUEIO TOTAL DA BARRA DE PROGRESSO E CLIQUES */
        .video-wrapper { position: relative; width: 100%; border-radius: 1rem; overflow: hidden; background: #000; }
        .video-overlay { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 30; 
            background: rgba(0,0,0,0); /* Invisível */
            cursor: default;
        }

        #content-delay { display: none; }
    </style>
</head>
<body class="selection:bg-red-600 selection:text-white">

    <div id="top-banner" class="bg-red-600 text-white text-center py-2 font-bold text-sm uppercase tracking-widest fixed w-full z-50">
        ⚠️ ÚLTIMAS <span id="vagas-count">19</span> VAGAS COM MAIS DE 70% OFF
    </div>

    <section class="px-6 pt-24 pb-8 max-w-4xl mx-auto text-center">
        <div class="inline-flex items-center gap-2 mb-6 bg-zinc-900/80 px-4 py-1.5 rounded-full border border-zinc-800">
            <span class="flex h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
            <span class="text-xs text-gray-300 font-medium"><span id="visitantes">134</span> assistindo agora</span>
        </div>

        <h1 class="text-3xl md:text-5xl font-black mb-6 leading-tight uppercase">
            Desligue sua mente e durma sem ficar rolando na cama por horas
        </h1>

        <div class="video-wrapper shadow-2xl mb-12">
            <div class="video-overlay"></div> <div style="padding:56.25% 0 0 0;position:relative;">
                <iframe id="vsl-video" 
                        src="https://player.vimeo.com/video/1183570418?autoplay=1&muted=1&controls=0&badge=0&autopause=0&player_id=0&app_id=58479" 
                        frameborder="0" 
                        allow="autoplay; fullscreen; picture-in-picture" 
                        style="position:absolute;top:0;left:0;width:100%;height:100%;" 
                        title="PAM">
                </iframe>
            </div>
        </div>
    </section>

    <div id="content-delay">
        <section class="px-6 py-8 max-w-4xl mx-auto text-center border-t border-zinc-900">
            <div class="wp-container">
                <div class="wp-msg">
                    <span class="wp-name">Rodrigo (Grupo Alunos)</span>
                    Mano, testei o gatilho de 7 min ontem. Acordei novo. 🔥
                    <span class="wp-time">14:20</span>
                </div>
            </div>
            
            <div class="mt-12 bg-zinc-900 p-8 rounded-3xl border border-zinc-800">
                <div class="text-5xl font-black text-green-500 mb-6 italic">R$ 27,90</div>
                <a href="https://pay.kiwify.com.br/6stdDAC" target="_blank" class="block w-full bg-green-600 hover:bg-green-500 text-white font-black py-5 px-4 rounded-xl text-xl transition-all uppercase shadow-lg">
                    QUERO MEU ACESSO IMEDIATO
                </a>
            </div>
        </section>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        const iframe = document.querySelector('#vsl-video');
        const player = new Vimeo.Player(iframe);

        // LÓGICA PARA FORÇAR O SOM
        window.addEventListener('load', function() {
            setTimeout(() => {
                player.setMuted(false); // Tira do mudo
                player.setVolume(1);   // Volume no talo
                player.play();         // Garante o play
            }, 1500); 
        });

        // 1. Desbloqueio (15 segundos)
        setTimeout(() => { 
            document.getElementById('content-delay').style.display = 'block'; 
        }, 15000);

        // 2. Escassez
        let vagas = 19;
        setInterval(() => {
            if (vagas > 3) {
                vagas -= Math.floor(Math.random() * 2);
                document.getElementById('vagas-count').innerText = vagas;
            }
        }, 15000);

        // 3. Visitantes
        setInterval(() => {
            const display = document.querySelector('#visitantes');
            let current = parseInt(display.textContent);
            display.textContent = current + (Math.floor(Math.random() * 5) - 2);
        }, 3000);
    </script>
</body>
</html>
